<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#101210" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="description" content="ByokTrans - 가져온 API Key로 구동하는 나만의 개인용 AI 웹소설 실시간 번역기. PWA 지원으로 모바일에서 네이티브 앱처럼 편리하게 감상하세요." />
    <meta property="og:title" content="ByokTrans - AI 웹소설 번역기" />
    <meta property="og:description" content="가져온 API Key로 구동하는 나만의 개인용 AI 웹소설 실시간 번역기" />
    <meta property="og:type" content="website" />
    <title>ByokTrans - AI 웹소설 번역기</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #101210; color: #e2e4e0; font-family: sans-serif;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // PWA 서비스 워커 등록 스크립트
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker Registered!', reg.scope))
            .catch(err => console.log('Service Worker Registration Failed:', err));
        });
      }
    </script>
  </body>
</html>
